[package]
name = "ipmap"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
pretty_env_logger = "0.4"
log = "0.4"
argh = "0.1"

actix-web = "4.2"
actix-web-lab = "0.18"
web-view = "0.7"

etherparse = "0.12"
pcap = "0.11"
ip_rfc = "0.1"

reqwest = "0.11"
tokio = { version = "1.21", features = ["full"] }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
