[package]
name = "ipmap"
version = "0.3.0"
description = ""
authors = ["Grant Handy <granthandy@proton.me>"]
license = "GPL-3"
repository = "https://github.com/grantshandy/ipmap"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "1.2.1", features = ["config-toml"] }

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "1.2.4", features = ["devtools", "dialog-message", "shell-open", "window-center"] }
etherparse = "0.13"
pcap = "1.0"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
