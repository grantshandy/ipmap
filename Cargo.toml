[workspace]
members = ["backend"]
resolver = "2"

# lean and mean
[profile.release]
opt-level = "z"
codegen-units = 1
lto = true
strip = true

# many dependencies are shared between the build script
# and application, so they are listed centrally here.
[workspace.dependencies]
pcap = "2.0.0"
dns-lookup = "2.0.4"
etherparse = "0.15.0"
ip_rfc = "0.1.0"
rayon = "1.10.0"
dashmap = "5.5.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1.40"
tracing-subscriber = "0.3.18"
lazy_static = "1.4.0"
csv = "1.3.0"
rangemap = { version = "1.5.1", features = ["serde1"] }
compact_str = { version = "0.7.1", features = ["serde"] }
bincode = "1.3.3"
time = { version = "0.3.36", features = ["serde"] }
uuid = { version = "1.8.0", features = ["v4", "serde"] }
miniz_oxide = "0.7.3"
eyre = "0.6.12"
ts-rs = { version = "8.1.0", features = ["uuid-impl"] }
rustc-hash = "1.1.0"
indexmap = { version = "2.2.6", features = ["serde"] }
heck = "0.5.0"
crossbeam-channel = "0.5.13"
public-ip = "0.2.2"
rstar = { version = "0.12.0", features = ["serde"] }
half = { version = "2.4.1", features = ["serde"] }
trippy-core = { git = "https://github.com/fujiapple852/trippy", package = "trippy-core" }
trippy-privilege = { git = "https://github.com/fujiapple852/trippy", package = "trippy-privilege" }
