[package]
product-name = "ipmap"
version = "0.3.0"

[build]
before-build-command = "npm run build"
before-dev-command = "npm run dev"
before-bundle-command = "sudo setcap cap_net_raw,cap_net_admin=eip ../target/release/ipmap"
dev-path = "http://localhost:5173"
dist-dir = "src-web/build"

[tauri.allowlist]
all = false
shell = { open = true }
window = { center = true }
dialog = { message = true }

[tauri.bundle]
active = true
category = "DeveloperTool"
copyright = "2023 Grant Handy"
icon = [
  "icons/32x32.png",
  "icons/128x128.png",
  "icons/128x128@2x.png",
  "icons/icon.icns",
  "icons/icon.ico"
]
identifier = "com.grantshandy.dev"
targets = "all"
deb = { depends = ["libpcap0.8"] }

[tauri.updater]
active = false
