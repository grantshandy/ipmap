<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="src/app.css" />
  </head>
  <script type="module">
    import { getVersion } from "@tauri-apps/api/app";
    import { appWindow } from "@tauri-apps/api/window";
    import { listen } from "@tauri-apps/api/event";
    import { open } from "@tauri-apps/api/shell";
    import { darkTheme } from "./src/themes";

    appWindow.onCloseRequested((event) => {
      event.preventDefault();
      appWindow.hide();
    });

    window.openLink = (link) => open(link);
    window.onload = () => {
      getVersion().then(
        (version) => (document.getElementById("version").innerText = version),
      );
      listen("theme", (ev) =>
        document.body.setAttribute("data-theme", ev.payload),
      );
    };
  </script>

  <body
    class="flex h-screen w-screen select-none flex-col space-y-8 bg-base-100 p-16 text-center"
  >
    <h1 class="text-2xl font-bold">Ipmap v<span id="version"></span></h1>

    <table class="table table-xs border border-base-200">
      <tbody>
        <tr>
          <th>Source Code</th>
          <td>
            <button
              onClick="openLink('https://github.com/grantshandy/ipmap')"
              class="link"
            >
              Github Repository
            </button>
          </td>
        </tr>
        <tr>
          <th>Issue Tracker</th>
          <td>
            <button
              onClick="openLink('https://github.com/grantshandy/ipmap/issues')"
              class="link"
            >
              Submit an Issue
            </button>
          </td>
        </tr>
        <tr>
          <th>Copyright</th>
          <td>
            &copy; 2024
            <button
              onClick="openLink('https://github.com/grantshandy')"
              class="link"
            >
              Grant Handy
            </button>
          </td>
        </tr>
        <tr>
          <th>License</th>
          <td>
            <button
              onClick="openLink('https://github.com/grantshandy/ipmap/blob/main/LICENSE')"
              class="link"
            >
              GNU General Public License v3.0
            </button>
          </td>
        </tr>
        <tr>
          <th>Special Thanks</th>
          <td>
            <button onClick="openLink('https://tauri.app')" class="link">
              Tauri</button
            >,
            <button onClick="openLink('https://svelte.dev')" class="link">
              Svelte</button
            >,
            <button onClick="openLink('https://www.tcpdump.org')" class="link">
              Libpcap</button
            >,
            <button onClick="openLink('https://npcap.com')" class="link">
              Npcap</button
            >,
            <button onClick="openLink('https://daisyui.com')" class="link">
              DaisyUI
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="flex grow flex-col-reverse">
      <button
        onClick="openLink('https://buymeacoffee.com/granthandy')"
        class="link italic"
      >
        Donate to help support the project!
      </button>
    </div>
  </body>
</html>
