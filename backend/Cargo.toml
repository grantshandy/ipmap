[package]
name = "ipmap"
version = "0.3.0"
description = ""
authors = ["Grant Handy <granthandy@proton.me>"]
license = "GPL-3"
repository = "https://github.com/grantshandy/ipmap"
edition = "2021"


[build-dependencies]
tauri-build = { version = "1.2.1", features = ["config-toml"] }

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "1.2.4", features = ["dialog-message", "shell-open", "window-center"] }
ureq = { version = "2.6", features = ["json"] }
etherparse = "0.13"
pcap = "1.0"
ip_rfc = "0.1"
dirs-next = "2.0"
microkv = "0.2"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
